<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Acceso Seguro | Cloud UI</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --blue: #58a6ff;
            --blue-dim: rgba(88, 166, 255, 0.18);
            --green: #3fb950;
            --surface: rgba(13, 17, 26, 0.72);
            --border: rgba(255, 255, 255, 0.08);
            --text: #e6edf3;
            --muted: rgba(230, 237, 243, 0.45);
        }

        body {
            margin: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #060b12;
            font-family: 'Inter', 'Segoe UI', sans-serif;
            overflow: hidden;
        }

        /* ── Canvas ── */
        #particles-canvas {
            position: fixed;
            inset: 0;
            z-index: 0;
            pointer-events: none; /* el canvas NO captura eventos; el JS maneja el mouse globalmente */
        }

        /* ── Card ── */
        .glass-card {
            position: relative;
            z-index: 10;
            background: var(--surface);
            backdrop-filter: blur(20px) saturate(160%);
            -webkit-backdrop-filter: blur(20px) saturate(160%);
            border-radius: 24px;
            border: 1px solid var(--border);
            box-shadow:
                0 0 0 1px rgba(88,166,255,0.04),
                0 32px 64px -16px rgba(0,0,0,0.9),
                inset 0 1px 0 rgba(255,255,255,0.06);
            padding: 3rem 2.75rem;
            width: 100%;
            max-width: 420px;
            color: var(--text);
            animation: cardIn 0.6s cubic-bezier(0.16,1,0.3,1) both;
        }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(28px) scale(0.97); }
            to   { opacity: 1; transform: translateY(0)    scale(1);    }
        }

        /* ── Logo / Header ── */
        .card-header {
            text-align: center;
            margin-bottom: 2.25rem;
        }

        .logo-ring {
            width: 56px; height: 56px;
            margin: 0 auto 1.1rem;
            border-radius: 50%;
            border: 2px solid rgba(88,166,255,0.35);
            display: flex; align-items: center; justify-content: center;
            background: radial-gradient(circle at 40% 40%, rgba(88,166,255,0.15), transparent 70%);
            box-shadow: 0 0 20px rgba(88,166,255,0.2);
            animation: pulse-ring 3s ease-in-out infinite;
        }

        @keyframes pulse-ring {
            0%,100% { box-shadow: 0 0 16px rgba(88,166,255,0.2); }
            50%      { box-shadow: 0 0 32px rgba(88,166,255,0.45); }
        }

        .logo-ring svg { width: 26px; height: 26px; }

        .card-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            letter-spacing: 3px;
            color: var(--text);
            text-transform: uppercase;
        }

        .card-header p {
            font-size: 0.78rem;
            color: var(--muted);
            margin-top: 0.3rem;
            letter-spacing: 0.5px;
        }

        /* ── Divider ── */
        .divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--border), transparent);
            margin-bottom: 2rem;
        }

        /* ── Form ── */
        .field { margin-bottom: 1.4rem; }

        .field label {
            display: block;
            font-size: 0.7rem;
            font-weight: 600;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: var(--muted);
            margin-bottom: 0.55rem;
        }

        .input-wrapper {
            position: relative;
        }

        .input-wrapper .icon {
            position: absolute;
            left: 14px; top: 50%; transform: translateY(-50%);
            width: 16px; height: 16px;
            color: var(--muted);
            transition: color 0.25s;
            pointer-events: none;
        }

        .input-wrapper input {
            width: 100%;
            background: rgba(255,255,255,0.04);
            border: 1.5px solid rgba(255,255,255,0.08);
            color: var(--text);
            border-radius: 12px;
            padding: 13px 44px 13px 42px;
            font-size: 0.9rem;
            font-family: inherit;
            transition: border-color 0.25s, box-shadow 0.25s, background 0.25s;
            outline: none;
        }

        .input-wrapper input::placeholder { color: rgba(255,255,255,0.25); }

        .input-wrapper input:hover {
            border-color: rgba(88,166,255,0.35);
            background: rgba(255,255,255,0.055);
        }

        .input-wrapper input:focus {
            border-color: var(--blue);
            background: rgba(88,166,255,0.06);
            box-shadow: 0 0 0 3px rgba(88,166,255,0.15), 0 0 20px rgba(88,166,255,0.1);
        }

        .input-wrapper input:focus + .icon,
        .input-wrapper:focus-within .icon { color: var(--blue); }

        /* toggle password */
        .toggle-pw {
            position: absolute; right: 13px; top: 50%; transform: translateY(-50%);
            background: none; border: none; cursor: pointer;
            color: var(--muted); padding: 4px;
            transition: color 0.2s;
            display: flex; align-items: center;
        }
        .toggle-pw:hover { color: var(--blue); }

        /* ── Extras row ── */
        .extras {
            display: flex; justify-content: space-between; align-items: center;
            margin: -0.3rem 0 1.6rem;
        }

        .check-label {
            display: flex; align-items: center; gap: 8px;
            font-size: 0.78rem; color: var(--muted); cursor: pointer;
        }

        .check-label input[type="checkbox"] {
            appearance: none;
            width: 15px; height: 15px;
            border: 1.5px solid rgba(255,255,255,0.15);
            border-radius: 4px; background: transparent;
            cursor: pointer; transition: all 0.2s;
            position: relative;
        }

        .check-label input[type="checkbox"]:checked {
            background: var(--blue); border-color: var(--blue);
        }

        .check-label input[type="checkbox"]:checked::after {
            content: '';
            position: absolute; left: 4px; top: 1px;
            width: 5px; height: 9px;
            border: 2px solid #fff; border-top: none; border-left: none;
            transform: rotate(45deg);
        }

        .forgot { font-size: 0.78rem; color: var(--blue); text-decoration: none; opacity: 0.8; transition: opacity 0.2s; }
        .forgot:hover { opacity: 1; }

        /* ── Submit button ── */
        .btn-submit {
            width: 100%;
            padding: 14px;
            border: none; border-radius: 12px;
            background: linear-gradient(135deg, #1f6feb 0%, #388bfd 100%);
            color: #fff;
            font-family: inherit;
            font-size: 0.85rem;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            cursor: pointer;
            position: relative; overflow: hidden;
            transition: transform 0.12s ease, box-shadow 0.2s ease;
            box-shadow: 0 4px 18px rgba(31,111,235,0.4);
        }

        .btn-submit::before {
            content: '';
            position: absolute; inset: 0;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
            opacity: 0; transition: opacity 0.2s;
        }

        .btn-submit:hover::before { opacity: 1; }

        .btn-submit:hover { box-shadow: 0 6px 28px rgba(56,139,253,0.55); transform: translateY(-1px); }

        .btn-submit:active { transform: scale(0.96); box-shadow: 0 2px 10px rgba(56,139,253,0.3); }

        /* ripple */
        .ripple-el {
            position: absolute; border-radius: 50%;
            background: rgba(255,255,255,0.25);
            transform: scale(0);
            animation: ripple-anim 0.55s linear;
            pointer-events: none;
        }
        @keyframes ripple-anim {
            to { transform: scale(4); opacity: 0; }
        }

        /* ── Footer ── */
        .card-footer {
            text-align: center;
            margin-top: 1.8rem;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .card-footer a { color: var(--blue); text-decoration: none; }
        .card-footer a:hover { text-decoration: underline; }

        /* ── Status badge (top right) ── */
        .status-badge {
            position: absolute; top: -12px; right: 22px;
            background: rgba(13,17,26,0.9);
            border: 1px solid rgba(63,185,80,0.4);
            border-radius: 20px;
            padding: 4px 12px;
            font-size: 0.67rem; font-weight: 600;
            letter-spacing: 1px; text-transform: uppercase;
            color: var(--green);
            display: flex; align-items: center; gap: 6px;
        }

        .status-dot {
            width: 6px; height: 6px; border-radius: 50%;
            background: var(--green);
            animation: blink 1.8s ease-in-out infinite;
        }

        @keyframes blink {
            0%,100% { opacity: 1; }
            50%      { opacity: 0.3; }
        }
    </style>
</head>
<body>

<canvas id="particles-canvas"></canvas>

<div class="glass-card">
    <div class="status-badge"><span class="status-dot"></span>Sistema activo</div>

    <div class="card-header">
        <div class="logo-ring">
            <svg viewBox="0 0 24 24" fill="none" stroke="#58a6ff" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
                <path d="M12 2L2 7l10 5 10-5-10-5z"/>
                <path d="M2 17l10 5 10-5"/>
                <path d="M2 12l10 5 10-5"/>
            </svg>
        </div>
        <h2>Evaluación sumativa 2</h2>
        <p>Arquitectura Multi Cloud</p>
    </div>

    <div class="divider"></div>

    <form id="login-form" method="post" autocomplete="off">
        {% csrf_token %}

        <div class="field">
            <label for="username">Usuario</label>
            <div class="input-wrapper">
                <input id="username" type="text" name="username" placeholder="nombre@empresa.com" required autocomplete="username">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/>
                </svg>
            </div>
        </div>

        <div class="field">
            <label for="password">Contraseña</label>
            <div class="input-wrapper">
                <input id="password" type="password" name="password" placeholder="••••••••••" required autocomplete="current-password">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
                </svg>
                <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Mostrar contraseña">
                    <svg id="eye-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
                    </svg>
                </button>
            </div>
        </div>

        <button type="submit" class="btn-submit" id="submit-btn">
            Iniciar Sesión
        </button>
    </form>
</div>

<script>
/* ─────────────────────────────────────────
   TOGGLE PASSWORD
───────────────────────────────────────── */
const pwInput = document.getElementById('password');
const toggleBtn = document.getElementById('toggle-pw');
const eyeIcon = document.getElementById('eye-icon');

const eyeOpen  = `<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>`;
const eyeClose = `<line x1="1" y1="1" x2="23" y2="23"/><path d="M10.94 6.08A6 6 0 0 1 12 6c7 0 11 6 11 6a16.5 16.5 0 0 1-1.67 2.68M6.72 6.72A10.05 10.05 0 0 0 1 12s4 8 11 8a9.74 9.74 0 0 0 5.39-1.61M9.9 4.24A9 9 0 0 1 12 4c7 0 11 6 11 6a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"/>`;

toggleBtn.addEventListener('click', () => {
    const show = pwInput.type === 'password';
    pwInput.type = show ? 'text' : 'password';
    eyeIcon.innerHTML = show ? eyeClose : eyeOpen;
});

/* ─────────────────────────────────────────
   RIPPLE EN EL BOTÓN
───────────────────────────────────────── */
document.getElementById('submit-btn').addEventListener('click', function(e) {
    const btn = this;
    const rect = btn.getBoundingClientRect();
    const r = document.createElement('span');
    r.className = 'ripple-el';
    const size = Math.max(rect.width, rect.height);
    r.style.cssText = `width:${size}px;height:${size}px;left:${e.clientX - rect.left - size/2}px;top:${e.clientY - rect.top - size/2}px`;
    btn.appendChild(r);
    setTimeout(() => r.remove(), 600);
});

/* ─────────────────────────────────────────
   PARTÍCULAS REACTIVAS AL MOUSE
───────────────────────────────────────── */
const canvas = document.getElementById('particles-canvas');
const ctx    = canvas.getContext('2d');

let W = canvas.width  = window.innerWidth;
let H = canvas.height = window.innerHeight;

/* Mouse / touch position */
const mouse = { x: W / 2, y: H / 2, radius: 160 };

window.addEventListener('mousemove', e => { mouse.x = e.clientX; mouse.y = e.clientY; });
window.addEventListener('touchmove',  e => {
    mouse.x = e.touches[0].clientX;
    mouse.y = e.touches[0].clientY;
}, { passive: true });

/* Resize */
window.addEventListener('resize', () => {
    W = canvas.width  = window.innerWidth;
    H = canvas.height = window.innerHeight;
    init();
});

/* ── Particle class ── */
class Particle {
    constructor() { this.reset(); }

    reset() {
        this.x  = Math.random() * W;
        this.y  = Math.random() * H;
        this.ox = this.x;                       // posición "base"
        this.oy = this.y;
        this.vx = (Math.random() - 0.5) * 0.6;
        this.vy = (Math.random() - 0.5) * 0.6;
        this.size = Math.random() * 1.8 + 0.6;
        this.alpha = Math.random() * 0.5 + 0.3;
    }

    update() {
        /* Movimiento base */
        this.ox += this.vx;
        this.oy += this.vy;

        /* Rebote en bordes */
        if (this.ox < 0 || this.ox > W) this.vx *= -1;
        if (this.oy < 0 || this.oy > H) this.vy *= -1;

        /* Fuerza de repulsión del mouse */
        const dx = this.ox - mouse.x;
        const dy = this.oy - mouse.y;
        const dist = Math.sqrt(dx * dx + dy * dy);
        const maxDist = mouse.radius;

        if (dist < maxDist) {
            const force = (maxDist - dist) / maxDist;   // 0..1
            const angle = Math.atan2(dy, dx);
            const push  = force * force * 5;            // suavizado cuadrático
            this.x = this.ox + Math.cos(angle) * push * maxDist * 0.3;
            this.y = this.oy + Math.sin(angle) * push * maxDist * 0.3;
        } else {
            /* Vuelve suavemente a la posición base */
            this.x += (this.ox - this.x) * 0.1;
            this.y += (this.oy - this.y) * 0.1;
        }
    }

    draw() {
        ctx.beginPath();
        ctx.arc(this.x, this.y, this.size, 0, Math.PI * 2);
        ctx.fillStyle = `rgba(88,166,255,${this.alpha})`;
        ctx.fill();
    }
}

/* ── Init ── */
const NUM = Math.min(110, Math.floor((W * H) / 10000)); // adapta densidad a pantalla
let particles = [];

function init() {
    particles = [];
    for (let i = 0; i < NUM; i++) particles.push(new Particle());
}

/* ── Líneas entre partículas (y entre mouse y partículas) ── */
const MAX_DIST_PP    = 120;  // partícula-partícula
const MAX_DIST_MOUSE = 160;  // partícula-mouse

function drawConnections() {
    for (let a = 0; a < particles.length; a++) {
        /* Mouse → partícula */
        const mdx  = particles[a].x - mouse.x;
        const mdy  = particles[a].y - mouse.y;
        const md   = Math.sqrt(mdx * mdx + mdy * mdy);
        if (md < MAX_DIST_MOUSE) {
            const op = (1 - md / MAX_DIST_MOUSE) * 0.6;
            ctx.beginPath();
            ctx.moveTo(mouse.x, mouse.y);
            ctx.lineTo(particles[a].x, particles[a].y);
            ctx.strokeStyle = `rgba(88,166,255,${op})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
        }

        /* Partícula → partícula */
        for (let b = a + 1; b < particles.length; b++) {
            const dx = particles[a].x - particles[b].x;
            const dy = particles[a].y - particles[b].y;
            const d  = Math.sqrt(dx * dx + dy * dy);
            if (d < MAX_DIST_PP) {
                const op = (1 - d / MAX_DIST_PP) * 0.35;
                ctx.beginPath();
                ctx.moveTo(particles[a].x, particles[a].y);
                ctx.lineTo(particles[b].x, particles[b].y);
                ctx.strokeStyle = `rgba(88,166,255,${op})`;
                ctx.lineWidth = 0.5;
                ctx.stroke();
            }
        }
    }
}

/* ── Brillo suave en posición del mouse ── */
function drawMouseGlow() {
    const grad = ctx.createRadialGradient(mouse.x, mouse.y, 0, mouse.x, mouse.y, mouse.radius);
    grad.addColorStop(0,   'rgba(88,166,255,0.06)');
    grad.addColorStop(1,   'rgba(88,166,255,0)');
    ctx.beginPath();
    ctx.arc(mouse.x, mouse.y, mouse.radius, 0, Math.PI * 2);
    ctx.fillStyle = grad;
    ctx.fill();
}

/* ── Loop ── */
function animate() {
    requestAnimationFrame(animate);
    ctx.clearRect(0, 0, W, H);
    drawMouseGlow();
    drawConnections();
    for (const p of particles) { p.update(); p.draw(); }
}

init();
animate();
</script>
</body>
</html>
